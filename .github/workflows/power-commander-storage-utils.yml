name: Build PowerCommander StorageUtils (SQLite deps)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up certificate
        shell: bash
        run: |
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > /d/Certificate_pkcs12.p12

      - name: Set variables
        shell: bash
        id: variables
        run: |
           echo "::set-output name=version::${GITHUB_REF#refs/tags/v}"
           echo "SM_HOST=${{ secrets.SM_HOST }}" >> "$GITHUB_ENV"
           echo "SM_API_KEY=${{ secrets.SM_API_KEY }}" >> "$GITHUB_ENV"
           echo "SM_CLIENT_CERT_FILE=D:/Certificate_pkcs12.p12" >> "$GITHUB_ENV"
           echo "SM_CLIENT_CERT_PASSWORD=${{ secrets.SM_CLIENT_CERT_PASSWORD }}" >> "$GITHUB_ENV"
           echo "C:\Program Files (x86)\Windows Kits\10\App Certification Kit" >> $GITHUB_PATH
           echo "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools" >> $GITHUB_PATH
           echo "C:\Program Files\DigiCert\DigiCert One Signing Manager Tools" >> $GITHUB_PATH

      - name: Setup DigiCert SSM Tools
        uses: digicert/ssm-code-signing@b300bb7e8c2ab85257d660fe5b6c6374131ca2ef

      - name: Sync Certificates
        shell: cmd
        env:
          KEYPAIR_ALIAS: ${{ secrets.KEYPAIR_ALIAS }}
        run: |
          smctl healthcheck
          smctl windows certsync --keypair-alias=%KEYPAIR_ALIAS%

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Commander references Microsoft.Data.Sqlite; publish output contains the managed + native SQLite files for PowerCommander StorageUtils.
      - name: Publish Commander (win-x64, SQLite dependencies)
        run: |
          if (Test-Path artifact) { Remove-Item -Force -Recurse artifact }
          dotnet publish Commander/Commander.csproj --configuration=Release -f net8.0 -r win-x64 --self-contained false -o artifact/publish
        shell: powershell

      - name: Sign SQLite managed assemblies (optional bundle)
        run: |
          $cert = Get-ChildItem -Path Cert:\CurrentUser\My\${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }} -CodeSigningCert
          foreach ($dll in @('Microsoft.Data.Sqlite.dll','SQLitePCLRaw.batteries_v2.dll','SQLitePCLRaw.core.dll','SQLitePCLRaw.provider.e_sqlite3.dll')) {
            $p = Join-Path 'artifact/publish' $dll
            if (Test-Path $p) { Set-AuthenticodeSignature -FilePath $p -Certificate $cert -HashAlgorithm SHA256 -TimestampServer "http://timestamp.digicert.com" }
          }
        shell: powershell

      - name: Prepare StorageUtils artifact
        shell: powershell
        run: |
          $buildOutput = Resolve-Path "artifact/publish"
          $artifactRoot = Join-Path $PWD "artifact/StorageUtils"

          if (Test-Path $artifactRoot) {
            Remove-Item -Force -Recurse $artifactRoot
          }

          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          $requiredManagedFiles = @(
            "Microsoft.Data.Sqlite.dll",
            "SQLitePCLRaw.batteries_v2.dll",
            "SQLitePCLRaw.core.dll",
            "SQLitePCLRaw.provider.e_sqlite3.dll"
          )

          foreach ($fileName in $requiredManagedFiles) {
            $sourcePath = Join-Path $buildOutput $fileName
            if (-not (Test-Path -LiteralPath $sourcePath -PathType Leaf)) {
              throw "Required artifact file not found: $sourcePath"
            }
            Copy-Item -LiteralPath $sourcePath -Destination $artifactRoot -Force
          }

          $nativeCandidates = @(
            (Join-Path $buildOutput "e_sqlite3.dll"),
            (Join-Path $buildOutput "runtimes/win-x64/native/e_sqlite3.dll")
          )

          $nativePath = $nativeCandidates | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } | Select-Object -First 1
          if (-not $nativePath) {
            throw "Required native SQLite library not found. Checked: $($nativeCandidates -join ', ')"
          }

          Copy-Item -LiteralPath $nativePath -Destination (Join-Path $artifactRoot "e_sqlite3.dll") -Force

      - name: Store StorageUtils artifact
        uses: actions/upload-artifact@v4
        with:
          name: StorageUtils-win-x64
          path: artifact/StorageUtils/
          retention-days: 1
